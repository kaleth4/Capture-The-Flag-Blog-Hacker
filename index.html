<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H4cker_B00k | CTF Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0a0a0a; color: #e0e0e0; font-family: 'Inter', sans-serif; }
        .blue-glow { box-shadow: 0 0 15px rgba(52, 109, 219, 0.3); }
        .border-blue { border-color: #346ddb; }
        .text-blue { color: #346ddb; }
        .bg-blue { background-color: #346ddb; }
        .modal { display: none; background: rgba(0, 0, 0, 0.8); }
        .card:hover { transform: translateY(-5px); transition: all 0.3s; border-color: #508bfc; }
    </style>
</head>
<body class="p-4 md:p-10">

    <header class="max-w-6xl mx-auto flex justify-between items-center mb-12 border-b border-zinc-800 pb-6">
        <div class="flex items-center gap-4">
            <div class="w-12 h-12 bg-blue rounded-lg flex items-center justify-center blue-glow">
                <i class="fas fa-terminal text-white text-xl"></i>
            </div>
            <h1 class="text-2xl font-bold tracking-tighter">H4CKER_<span class="text-blue">B00K</span> <span class="text-xs bg-zinc-800 px-2 py-1 rounded ml-2">CTF LOG</span></h1>
        </div>
        <button onclick="toggleModal()" class="bg-blue hover:bg-blue-600 text-white px-4 py-2 rounded-xl transition-all flex items-center gap-2">
            <i class="fas fa-plus"></i> Nueva Sesión
        </button>
    </header>

    <main id="ctf-container" class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        </main>

    <div id="modal" class="modal fixed inset-0 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-zinc-900 border border-zinc-800 p-8 rounded-2xl w-full max-w-md blue-glow">
            <h2 class="text-xl font-bold mb-4 border-b border-blue pb-2">Documentar Nuevo CTF</h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm mb-1 text-zinc-400">Título del Reto</label>
                    <input type="text" id="title" class="w-full bg-black border border-zinc-700 p-2 rounded focus:border-blue outline-none">
                </div>
                <div>
                    <label class="block text-sm mb-1 text-zinc-400">Categoría (Web, Pwn, Crypto...)</label>
                    <input type="text" id="category" class="w-full bg-black border border-zinc-700 p-2 rounded focus:border-blue outline-none">
                </div>
                <div>
                    <label class="block text-sm mb-1 text-zinc-400">Documentación / Write-up</label>
                    <textarea id="content" rows="5" class="w-full bg-black border border-zinc-700 p-2 rounded focus:border-blue outline-none text-sm"></textarea>
                </div>
                <div class="flex gap-2 pt-4">
                    <button onclick="saveCTF()" class="flex-1 bg-blue p-2 rounded font-bold hover:bg-blue-700">Guardar</button>
                    <button onclick="toggleModal()" class="flex-1 bg-zinc-800 p-2 rounded font-bold hover:bg-zinc-700">Cancelar</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const modal = document.getElementById('modal');
        const container = document.getElementById('ctf-container');

        function toggleModal() {
            modal.style.display = modal.style.display === 'flex' ? 'none' : 'flex';
        }

        function saveCTF() {
            const title = document.getElementById('title').value;
            const category = document.getElementById('category').value;
            const content = document.getElementById('content').value;

            if(!title || !content) return alert("Por favor rellena el título y el contenido");

            const newCTF = { title, category, content, date: new Date().toLocaleDateString() };
            
            // Guardar en LocalStorage
            let ctfList = JSON.parse(localStorage.getItem('my_ctfs')) || [];
            ctfList.push(newCTF);
            localStorage.setItem('my_ctfs', JSON.stringify(ctfList));

            renderCTFs();
            toggleModal();
            // Limpiar campos
            document.getElementById('title').value = '';
            document.getElementById('content').value = '';
        }

        function renderCTFs() {
            container.innerHTML = '';
            const ctfList = JSON.parse(localStorage.getItem('my_ctfs')) || [];

            ctfList.forEach((ctf, index) => {
                container.innerHTML += `
                    <div class="card bg-zinc-900/50 border border-zinc-800 p-6 rounded-2xl">
                        <div class="flex justify-between items-start mb-4">
                            <span class="text-xs font-mono text-blue bg-blue/10 px-2 py-1 rounded">${ctf.category || 'General'}</span>
                            <span class="text-[10px] text-zinc-500">${ctf.date}</span>
                        </div>
                        <h3 class="text-lg font-bold mb-3">${ctf.title}</h3>
                        <details class="group cursor-pointer">
                            <summary class="list-none text-sm text-zinc-400 group-open:text-blue flex items-center gap-2">
                                <i class="fas fa-chevron-right transition-transform group-open:rotate-90"></i> 
                                Ver documentación
                            </summary>
                            <div class="mt-4 p-4 bg-black rounded border-l-2 border-blue text-sm text-zinc-300 whitespace-pre-wrap font-mono">
                                ${ctf.content}
                            </div>
                        </details>
                        <button onclick="deleteCTF(${index})" class="mt-4 text-[10px] text-zinc-600 hover:text-red-500 uppercase tracking-widest">Eliminar</button>
                    </div>
                `;
            });
        }

        function deleteCTF(index) {
            let ctfList = JSON.parse(localStorage.getItem('my_ctfs'));
            ctfList.splice(index, 1);
            localStorage.setItem('my_ctfs', JSON.stringify(ctfList));
            renderCTFs();
        }

        // Cargar al iniciar
        renderCTFs();
    </script>
</body>
</html>
